<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FEWS Share</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">
        <div>
          <h1>FEWS Share</h1>
          <p>Multi-Model Global Flood Early Warning System · HydroBASINS Level 12</p>
        </div>
      </div>
      <div id="legend" class="legend"></div>
    </header>

    <main id="main">
      <div id="map"></div>

      <aside id="panel" class="panel">
        <div class="panel-empty" id="panel-empty">
          <h2>No basin selected</h2>
          <p>Click a highlighted basin on the map to see every model's
             forecast for it.</p>
        </div>
        <div class="panel-content" id="panel-content" hidden></div>
      </aside>
    </main>
  </div>

  <!-- Leaflet library -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Generated basin data: window.FLOOD_DATA (run build_basins.py to refresh) -->
  <script src="data.js"></script>
  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
